services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ddc_user
      POSTGRES_PASSWORD: ddc_pass
      POSTGRES_DB: ddc_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ddc_user -d ddc_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://ddc_user:ddc_pass@db:5432/ddc_db
      SECRET_KEY: clave_secreta_jwt_cambiar_en_produccion
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      INACTIVITY_TIMEOUT_MINUTES: 30
      RUN_DEMO_SEED: "false"
      AI_MODE: ${AI_MODE:-mock}
      OCR_PROVIDER: ${OCR_PROVIDER:-mock}
      LLM_PROVIDER: ${LLM_PROVIDER:-none}
      EMBEDDINGS_PROVIDER: ${EMBEDDINGS_PROVIDER:-mock}
      AI_STRICT_MODE: ${AI_STRICT_MODE:-true}
      AI_MIN_CONFIDENCE: ${AI_MIN_CONFIDENCE:-0.82}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      GROQ_VISION_MODEL: ${GROQ_VISION_MODEL:-meta-llama/llama-4-scout-17b-16e-instruct}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_MODEL: ${GOOGLE_MODEL:-gemini-1.5-flash}
      GOOGLE_EMBEDDING_MODEL: ${GOOGLE_EMBEDDING_MODEL:-text-embedding-004}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_LLM_MODEL: ${OLLAMA_LLM_MODEL:-gemma3:4b}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"

    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - ./frontend/postcss.config.js:/app/postcss.config.js
      - ./frontend/package.json:/app/package.json
      - node_modules:/app/node_modules

  sonarqube:
    image: sonarqube:community
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://db:5432/ddc_db
      SONAR_JDBC_USERNAME: ddc_user
      SONAR_JDBC_PASSWORD: ddc_pass
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    depends_on:
      - db
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions

volumes:
  postgres_data:
  node_modules:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
